<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registre</title>
    <!--Añadimos la oja de estilos-->
    <link rel="stylesheet" href="estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="Material/Favicon.jfif" type="image/jifi"> <!--Este es el favicon-->

</head>
<body>
<!--En este iframe esta la cabezera-->
<iframe id="header" src="header.html" title="Header"></iframe>

<div class="contenido">
    <form action="#" method="POST" id="Registrat">
        <h2 id="Registre">Registre</h2>
        <div class="fons">
            <div class="textregistre">
                <p>Usuari</p>
                <p>Contrasenya</p>
                <p>Re-introdueix contrasenya</p>
                <p>Email</p>
                <p>Telefon<p>

    </div>
    <div class="campsregistre">
        <input type="text" name= "Usuari">
        <input type="password" name="Contrasenya">
        <input type="password" name="Re-Contrasenya">
        <input type="email" name="Email">
        <input type="tel" name="Telefon">
        <input type="submit" name="Enviar">
    </div>
    </div>
</form>
<form action="#" method="POST" id="IniciarSessió">
    <h2 id="Inici Sessió">Inici sessió</h2>
    <div class="fons-inici">
    <div class="textinici">
        <p>Usuari</p>
        <p>Contrasenya</p>
    </div>
    <div class="campsinici">
        <input type="text" name= "Usuari">
        <input type="password" name="Contrasenya">
        <input type="submit" name="Enviar">
    </div>

    </div>
</form>

<!--En este iframe va el pie de pagina-->
<iframe id="footer" src="footer.html" title="Header" ></iframe>
</body>
</html>
