<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacte</title>
    <!-- Enlace a la hoja de estilos externa -->
    <link rel="stylesheet" href="estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="Material/Favicon.jfif" type="image/jfif"> <!-- Favicon -->
</head>
<body>

<!-- Cabecera -->
<iframe id="header" src="header.html" title="Header"></iframe>

<!-- Contenido principal -->
<div class="contenido">
    <h1>¡Bienvenido a nuestra página de contacto!</h1>
    <p>Si deseas comunicarte con nosotros, por favor completa el siguiente formulario:</p>
    <form action="#" method="post" id="Contacto">
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre completo</label>
            <input type="text" class="form-control" id="nombre" name="nombre" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-3">
            <label for="mensaje" class="form-label">Mensaje</label>
            <textarea class="form-control" id="mensaje" name="mensaje" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
</div>

<!-- Pie de página -->
<iframe id="footer" src="footer.html" title="Footer"></iframe>

</body>
</html>
